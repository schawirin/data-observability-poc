services:
  # Data sources and targets used by the Control-M simulator.
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: demo-oracle
    environment:
      ORACLE_PASSWORD: OracleDemo123!
      APP_USER: demopoc
      APP_USER_PASSWORD: OracleDemo123!
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 120s
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./sql/oracle:/container-entrypoint-initdb.d
    labels:
      com.datadoghq.ad.logs: '[{"source":"oracle","service":"demo-oracle"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "demo-oracle"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: demo-sqlserver
    hostname: demo-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SqlDemo12345!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SqlDemo12345!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    volumes:
      - sqlserver_data:/var/opt/mssql
    labels:
      com.datadoghq.ad.logs: '[{"source":"sqlserver","service":"demo-sqlserver"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "demo-sqlserver"

  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: demo-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./sql/sqlserver:/sql
    entrypoint: >
      /bin/bash -c "
      /opt/mssql-tools/bin/sqlcmd -S demo-sqlserver -U sa -P 'SqlDemo12345!' -i /sql/schema.sql &&
      echo 'SQL Server schema initialized'
      "

  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: demopoc2026
      POSTGRES_DB: exchange
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_activity_query_size=4096
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_io_timing=on
      - -c
      - logging_collector=on
      - -c
      - log_directory=log
      - -c
      - log_filename=postgresql-%Y-%m-%d.log
      - -c
      - log_min_duration_statement=1000
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: demo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-demopoc2026}
      MYSQL_DATABASE: exchange
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema:/docker-entrypoint-initdb.d
      - ./sql/seeds:/seeds
    labels:
      com.datadoghq.ad.logs: '[{"source":"mysql","service":"demo-mysql"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "demo-mysql"
    command: >
      --performance-schema=ON
      --performance-schema-consumer-events-statements-current=ON
      --performance-schema-consumer-events-statements-history=ON
      --performance-schema-consumer-events-statements-history-long=ON
      --performance-schema-consumer-events-waits-current=ON
      --performance-schema-consumer-events-waits-history=ON
      --max-digest-length=4096
      --performance-schema-max-digest-length=4096
      --slow-query-log=ON
      --long-query-time=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-demopoc2026}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: demo-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: demo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/mock-exchange &&
      mc mb --ignore-existing local/mock-exchange/exports
      "

  datadog-agent:
    build: ./datadog
    image: b3-datadog-agent:7
    container_name: demo-datadog-agent
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_ENV: demo
      DD_TAGS: "team:data-platform domain:capital-markets"
      DD_HOSTNAME: b3-local-compose
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "false"
      DD_DBM_ENABLED: "true"
      DD_PROCESS_AGENT_ENABLED: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_DOGSTATSD_TAG_CARDINALITY: orchestrator
      DD_ENABLE_METADATA_COLLECTION: "true"
    # Sem port binding no host — coexiste com outro Datadog Agent (org diferente)
    # rodando em outro projeto. Todos os serviços B3 alcançam o agent via
    # rede privada `b3-network` (hostname interno: `datadog-agent`).
    # Se precisar enviar dados do host, use `podman exec demo-datadog-agent`.
    volumes:
      - ./datadog/conf.d:/etc/datadog-agent/conf.d
      - ./datadog/datadog.yaml:/etc/datadog-agent/datadog.yaml:ro
      # Runtime socket enables container metadata/autodiscovery for optional
      # CI/CD and DinD experiments. File log tailing below remains the fallback.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sqlserver_data:/var/log/sqlserver:ro
      - controlm-sim-data:/var/log/controlm-sim:ro
      - ./logs:/var/log/b3-demo:ro
      - mysql_data:/var/log/mysql-data:ro
      - pg_data:/var/log/postgres-data:ro

  # dbt-runner removed 2026-05-26: the B3 POC must demonstrate OpenLineage
  # emitted exclusively by hand-written Python wrappers (controlm-sim,
  # pipeline-runner). dbt-core with openlineage-dbt would emit lineage
  # automatically and contaminate the test setup. See services/dbt-project/
  # if you want to re-enable a second-phase "after we added dbt" demo.

  adminer:
    image: adminer:latest
    container_name: demo-adminer
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  market-mock:
    build: ./services/market-mock
    container_name: demo-market-mock
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-demopoc2026}
      MYSQL_DATABASE: exchange
      POSTGRES_HOST: postgres
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: demopoc2026
      POSTGRES_DB: exchange
      # Oracle source — required by faults.py and generators.py for fault injection
      ORACLE_HOST: oracle
      ORACLE_PORT: 1521
      ORACLE_SERVICE: XEPDB1
      ORACLE_USER: demopoc
      ORACLE_PASSWORD: OracleDemo123!
      # SQL Server destination — required by fault injection to mirror Oracle faults into the DW
      MSSQL_HOST: sqlserver
      MSSQL_PORT: 1433
      MSSQL_USER: sa
      MSSQL_SA_PASSWORD: "SqlDemo12345!"
      MSSQL_DATABASE: demopoc
    labels:
      com.datadoghq.ad.logs: '[{"source":"python","service":"market-mock"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "market-mock"
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      oracle:
        condition: service_healthy
      sqlserver:
        condition: service_healthy

  pipeline-runner:
    build: ./services/pipeline-runner
    container_name: demo-pipeline-runner
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-demopoc2026}
      MYSQL_DATABASE: exchange
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: 8126
      DD_API_KEY: ${DD_API_KEY}
      DD_APP_KEY: ${DD_APP_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_SERVICE: pipeline-runner
      DD_ENV: demo
      DD_VERSION: "2.0.0"
      DD_TRACE_ENABLED: "true"
      DD_TRACE_AGENT_URL: http://datadog-agent:8126
      DD_LOGS_INJECTION: "true"
      OL_NAMESPACE: b3-poc-demo-v3
      OL_PIPELINE: b3_d1_pipeline
      OL_EVENT_TIME_SHIFT_HOURS: "3"
      OL_ORACLE_NS: oracle://demo-oracle:1521
      OL_SQLSERVER_NS: sqlserver://demo-sqlserver:1433
      OL_S3_NS: s3://mock-exchange
      ORACLE_HOST: oracle
      ORACLE_SERVICE: XEPDB1
      SQLSERVER_HOST: sqlserver
      SQLSERVER_PORT: 1433
      SQLSERVER_USER: sa
      SQLSERVER_PASSWORD: "SqlDemo12345!"
      SQLSERVER_DATABASE: demopoc
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    labels:
      com.datadoghq.ad.logs: '[{"source":"python","service":"pipeline-runner"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "pipeline-runner"
    depends_on:
      mysql:
        condition: service_healthy
      datadog-agent:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./services/pipeline-runner:/app
    command: ["python", "trigger_server.py"]
    ports:
      - "5001:5001"

  controlm-sim:
    build: ./services/controlm-sim
    container_name: demo-controlm-sim
    ports:
      - "5000:5000"
    environment:
      # Oracle source
      ORACLE_HOST: oracle
      ORACLE_PORT: 1521
      ORACLE_SERVICE: XEPDB1
      ORACLE_USER: demopoc
      ORACLE_PASSWORD: OracleDemo123!
      # SQL Server destination
      SQLSERVER_HOST: sqlserver
      SQLSERVER_PORT: 1433
      SQLSERVER_USER: sa
      SQLSERVER_PASSWORD: "SqlDemo12345!"
      SQLSERVER_DATABASE: demopoc
      # MySQL (legacy/fallback)
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-demopoc2026}
      MYSQL_DATABASE: exchange
      # Postgres
      POSTGRES_HOST: postgres
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: demopoc2026
      POSTGRES_DB: exchange
      # Datadog
      DD_AGENT_HOST: datadog-agent
      DD_DOGSTATSD_PORT: 8125
      DD_TRACE_AGENT_PORT: 8126
      DD_API_KEY: ${DD_API_KEY}
      DD_APP_KEY: ${DD_APP_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_SERVICE: controlm-sim
      DD_ENV: demo
      DD_VERSION: "2.0.0"
      DD_TRACE_ENABLED: "true"
      DD_TRACE_AGENT_URL: http://datadog-agent:8126
      DD_LOGS_INJECTION: "true"
      DD_RUNTIME_METRICS_ENABLED: "true"
      OL_NAMESPACE: b3-poc-demo-v3
      OL_PIPELINE: b3_d1_pipeline
      OL_EVENT_TIME_SHIFT_HOURS: "3"
      OL_ORACLE_NS: oracle://demo-oracle:1521
      OL_SQLSERVER_NS: sqlserver://demo-sqlserver:1433
      OL_S3_NS: s3://mock-exchange
      CTM_SERVER: demo-poc-ctm
      CTM_APPLICATION: exchange-data-platform
      CTM_SUB_APPLICATION: derivatives
      CTM_HOST: controlm-sim
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    labels:
      com.datadoghq.ad.logs: '[{"source":"python","service":"controlm-sim"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "controlm-sim"
    depends_on:
      oracle:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      datadog-agent:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./services/controlm-sim:/app
      - ./services/pipeline-runner:/app/pipeline-runner
      - ./services/market-mock:/app/market-mock
      - controlm-sim-data:/data

  # ── Demo cron sidecar ─────────────────────────────────────────────────────
  # Rotates demo scenarios every INTERVAL_SECONDS to keep Datadog populated
  # with continuous DJM/Lineage/DBM activity. Avoids macOS TCC blocking
  # launchd from accessing ~/Documents. Stop with `podman compose stop demo-cron`.
  demo-cron:
    profiles: ["cron"]
    build: ./services/cron-sidecar
    image: b3-cron-sidecar:latest
    container_name: demo-cron
    privileged: true
    user: "0:0"
    environment:
      INTERVAL_SECONDS: "900"
      REPO: /repo
    volumes:
      - .:/repo:ro
      - ./logs:/repo/logs
      - ./services/cron-sidecar:/cron:ro
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      com.datadoghq.ad.logs: '[{"source":"shell","service":"demo-cron"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "demo-cron"
    depends_on:
      controlm-sim:
        condition: service_started
      pipeline-runner:
        condition: service_started
      market-mock:
        condition: service_started

  # ── Docker-in-Docker CI/CD demo ──────────────────────────────────────────
  # Optional profile that mimics a Jenkins job running docker build/docker run
  # against an isolated Docker daemon. Start with `make dind-run`.
  ci-dind:
    profiles: ["dind"]
    image: docker:27-dind
    container_name: demo-ci-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command:
      - --host=tcp://0.0.0.0:2375
      - --host=unix:///var/run/docker.sock
    volumes:
      - ci_dind_data:/var/lib/docker
      - ./logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    labels:
      com.datadoghq.ad.logs: '[{"source":"docker","service":"ci-dind"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "ci-dind"
      com.datadoghq.tags.component: "ci-cd"

  ci-jenkins-job:
    profiles: ["dind"]
    image: docker:27-cli
    container_name: demo-ci-jenkins-job
    environment:
      DOCKER_HOST: tcp://ci-dind:2375
      CI_PIPELINE_NAME: b3-dind-demo
      CI_LOG_FILE: /logs/dind-ci.log
    volumes:
      - ./services/ci-dind:/workspace:ro
      - ./logs:/logs
    entrypoint: ["/bin/sh", "/workspace/run_ci_job.sh"]
    labels:
      com.datadoghq.ad.logs: '[{"source":"jenkins","service":"ci-jenkins-job"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "ci-jenkins-job"
      com.datadoghq.tags.component: "ci-cd"
      com.datadoghq.tags.ci_provider: "jenkins"
    depends_on:
      ci-dind:
        condition: service_healthy
      datadog-agent:
        condition: service_started

  controlm-workbench:
    profiles: ["workbench"]
    image: registry.hub.docker.com/controlm/workbench:latest
    platform: linux/amd64
    container_name: demo-controlm-workbench
    ports:
      - "8443:8443"
    environment:
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: "8126"
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      OL_NAMESPACE: b3-poc-demo-v3
      OL_PIPELINE: b3_d1_pipeline
      OL_EVENT_TIME_SHIFT_HOURS: "3"
      OL_ORACLE_NS: oracle://demo-oracle:1521
      OL_SQLSERVER_NS: sqlserver://demo-sqlserver:1433
      OL_S3_NS: s3://mock-exchange
      PIPELINE_CONTAINER: demo-pipeline-runner
    labels:
      com.datadoghq.ad.logs: '[{"source":"controlm","service":"controlm-workbench"}]'
      com.datadoghq.tags.env: "demo"
      com.datadoghq.tags.service: "controlm-workbench"
    depends_on:
      datadog-agent:
        condition: service_started
      controlm-sim:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./controlm/scripts:/scripts

volumes:
  pg_data:
  mysql_data:
  minio_data:
  oracle_data:
  sqlserver_data:
  controlm-sim-data:
  ci_dind_data:

# Rede dedicada para a POC — isola este stack de outros projetos com Datadog Agent
# (ex: outro projeto DogBank rodando em paralelo na mesma máquina). Todos os
# serviços abaixo entram nessa rede automaticamente por causa de `networks:` no
# default top-level (compose v3 cria a rede com este nome explícito).
networks:
  default:
    name: b3-network
    driver: bridge
