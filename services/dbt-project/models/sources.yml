version: 2

sources:
  - name: raw
    schema: public
    description: "Raw market data generated by market-mock"
    tables:
      - name: raw_trades
        description: "Intraday trade executions"
      - name: raw_orders
        description: "Order book entries"
      - name: raw_participant_positions
        description: "End-of-day participant positions"
      - name: raw_settlement_instructions
        description: "Settlement instructions from clearing"
      - name: participants
        description: "Reference data: brokers and participants"
